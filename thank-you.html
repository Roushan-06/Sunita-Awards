<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for registering for the Kalpataru Mindset Transformation Program." />
  <meta http-equiv="refresh" content="3; url=https://chat.whatsapp.com/LqSBJBdlzyyLUPOOau7Zgz" />
  <title>Thank You | Kalpataru Mindset Transformation Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --surface-soft: #faf8f3;
      --text: #171512;
      --muted: #6f6a61;
      --line: #ebe5da;
      --champagne: #b8944f;
      --champagne-dark: #87682f;
      --sage: #738276;
      --shadow: 0 24px 80px rgba(31, 26, 18, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Lato", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .thank-you-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
      background:
        linear-gradient(180deg, rgba(250, 248, 243, 0.92), rgba(255, 255, 255, 0.98)),
        #fff;
    }

    .thank-you-card {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: clamp(30px, 6vw, 58px);
      text-align: center;
    }

    .kicker {
      color: var(--champagne-dark);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(36px, 7vw, 62px);
      line-height: 1.04;
      margin-bottom: 18px;
      color: #141414;
    }

    .gradient-text {
      background: linear-gradient(90deg, #997331, #6f8173);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      color: var(--muted);
      font-size: clamp(17px, 2.2vw, 20px);
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 28px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: #fff;
      background: linear-gradient(135deg, #1f1a13, #090807);
      box-shadow: 0 18px 38px rgba(17, 17, 17, 0.16);
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(17, 17, 17, 0.2);
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      .thank-you-card {
        padding: 28px 20px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="thank-you-page">
    <section class="thank-you-card" aria-labelledby="thank-you-title">
      <div class="kicker">Registration received</div>
      <h1 id="thank-you-title">Thank you for joining <span class="gradient-text">Kalpataru.</span></h1>
      <p>Your form has been submitted. You will be redirected to the WhatsApp group in a few seconds for seminar updates and next steps.</p>
      <a class="btn" href="https://chat.whatsapp.com/LqSBJBdlzyyLUPOOau7Zgz" target="_blank" rel="noopener noreferrer">Join WhatsApp Group</a>
      <div class="note">If the redirect does not open automatically, use the button above.</div>
    </section>
  </main>

  <script>
    window.setTimeout(function () {
      window.location.href = "https://chat.whatsapp.com/LqSBJBdlzyyLUPOOau7Zgz";
    }, 3000);
  </script>
</body>
</html>
